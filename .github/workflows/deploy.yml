name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 65.20.108.4
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/MentoBot
            git pull origin master
            source ~/.nvm/nvm.sh
            npm install --production
            pm2 restart MentoBot MentoAPI
            pm2 save
